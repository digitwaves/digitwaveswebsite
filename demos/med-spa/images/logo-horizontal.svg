<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" role="img" aria-label="Aurelle Aesthetic Studio">
  <title>Aurelle Aesthetic Studio</title>
  <desc>Refined wordmark logo for Aurelle Aesthetic Studio, featuring a minimal eucalyptus leaf mark paired with a serif wordmark.</desc>

  <!-- Leaf mark on the left -->
  <g transform="translate(8, 18)" aria-hidden="true">
    <!-- Small stem -->
    <line x1="22" y1="0" x2="22" y2="6"
          stroke="#2A2E28" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Leaf body — eucalyptus shape -->
    <path d="M 22 6
             C 32 10, 35 20, 33 32
             C 31 44, 25 52, 22 52
             C 19 52, 13 44, 11 32
             C 9 20, 12 10, 22 6 Z"
          fill="#2A2E28"/>
    <!-- Central vein highlight -->
    <line x1="22" y1="10" x2="22" y2="50"
          stroke="#F4F1EA" stroke-width="0.7" opacity="0.45" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="62" y="54"
        font-family="'Cormorant Garamond', 'Cormorant', 'Times New Roman', Georgia, serif"
        font-size="42"
        font-weight="500"
        letter-spacing="3"
        fill="#2A2E28">Aurelle</text>

  <!-- Subtitle (small, refined caps) -->
  <text x="64" y="72"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="9"
        font-weight="400"
        letter-spacing="4.5"
        fill="#2A2E28"
        opacity="0.6">AESTHETIC STUDIO</text>
</svg>
