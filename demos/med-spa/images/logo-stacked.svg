<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Aurelle Aesthetic Studio">
  <title>Aurelle Aesthetic Studio</title>
  <desc>Stacked wordmark logo for Aurelle Aesthetic Studio, featuring a centered eucalyptus leaf mark above the wordmark and refined subtitle.</desc>

  <!-- Centered leaf mark -->
  <g transform="translate(98, 56)" aria-hidden="true">
    <!-- Small stem -->
    <line x1="22" y1="0" x2="22" y2="6"
          stroke="#2A2E28" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Leaf body -->
    <path d="M 22 6
             C 34 11, 37 22, 35 35
             C 33 48, 25 56, 22 56
             C 19 56, 11 48, 9 35
             C 7 22, 10 11, 22 6 Z"
          fill="#2A2E28"/>
    <!-- Central vein highlight -->
    <line x1="22" y1="10" x2="22" y2="54"
          stroke="#F4F1EA" stroke-width="0.8" opacity="0.45" stroke-linecap="round"/>
  </g>

  <!-- Wordmark, centered -->
  <text x="120" y="170"
        font-family="'Cormorant Garamond', 'Cormorant', 'Times New Roman', Georgia, serif"
        font-size="52"
        font-weight="500"
        letter-spacing="5"
        text-anchor="middle"
        fill="#2A2E28">Aurelle</text>

  <!-- Subtitle -->
  <text x="120" y="200"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="7"
        text-anchor="middle"
        fill="#2A2E28"
        opacity="0.6">AESTHETIC STUDIO</text>

  <!-- Optional thin sage hairline beneath subtitle -->
  <line x1="100" y1="216" x2="140" y2="216"
        stroke="#8FA88A" stroke-width="0.8" opacity="0.7"/>
</svg>
